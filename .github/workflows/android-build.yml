name: Android APK Build

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "gradle/**"
      - "build.gradle"
      - "settings.gradle"
      - "gradle.properties"
      - "gradlew"
      - "gradlew.bat"
      - ".github/workflows/android-build.yml"
      - "version.properties"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Read version properties
        id: version
        run: |
          VERSION_NAME=$(grep -E '^versionName=' version.properties | cut -d'=' -f2)
          VERSION_CODE=$(grep -E '^versionCode=' version.properties | cut -d'=' -f2)
          echo "VERSION_NAME=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "VERSION_CODE=$VERSION_CODE" >> "$GITHUB_OUTPUT"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug and release APKs
        run: bash ./gradlew --no-daemon assembleDebug assembleRelease

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: pixelpet-v${{ steps.version.outputs.VERSION_NAME }}
          path: |
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="v${{ steps.version.outputs.VERSION_NAME }}"
          gh release create "$TAG" \
            --target "$GITHUB_SHA" \
            --title "PixelPet v${{ steps.version.outputs.VERSION_NAME }} (build #${{ github.run_number }})" \
            --notes "Version: ${{ steps.version.outputs.VERSION_NAME }}\nVersion Code: ${{ steps.version.outputs.VERSION_CODE }}" \
            app/build/outputs/apk/debug/*.apk \
            app/build/outputs/apk/release/*.apk
